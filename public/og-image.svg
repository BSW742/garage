  <!-- Text -->
  <text x="600" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="600" fill="white" text-anchor="middle">garage.co.nz</text>
  <text x="600" y="500" font-family="system-ui, -apple-system, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle">Find your next car in New Zealand</text>
